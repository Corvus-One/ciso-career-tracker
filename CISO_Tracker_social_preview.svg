<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0c10"/>
      <stop offset="100%" stop-color="#10141f"/>
    </linearGradient>
    <!-- Accent glow -->
    <radialGradient id="glow1" cx="20%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#7c6af7" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7c6af7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#4fc3f7" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#4fc3f7" stop-opacity="0"/>
    </radialGradient>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <rect width="1280" height="640" fill="url(#glow1)"/>
  <rect width="1280" height="640" fill="url(#glow2)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="4" height="640" fill="#7c6af7"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1280" height="1" fill="#272d3d"/>

  <!-- Shield icon - large decorative -->
  <g transform="translate(940, 200)" opacity="0.06">
    <path d="M170 0 L340 60 L340 200 C340 290 255 360 170 400 C85 360 0 290 0 200 L0 60 Z" fill="#7c6af7"/>
  </g>

  <!-- Decorative circuit lines -->
  <g stroke="#7c6af7" stroke-width="1" opacity="0.15" fill="none">
    <path d="M900 100 L1000 100 L1000 150 L1100 150"/>
    <path d="M900 520 L980 520 L980 480 L1060 480"/>
    <circle cx="900" cy="100" r="4" fill="#7c6af7"/>
    <circle cx="1100" cy="150" r="4" fill="#7c6af7"/>
    <circle cx="900" cy="520" r="4" fill="#7c6af7"/>
    <circle cx="1060" cy="480" r="4" fill="#7c6af7"/>
  </g>
  <g stroke="#4fc3f7" stroke-width="1" opacity="0.1" fill="none">
    <path d="M80 500 L80 560 L200 560"/>
    <path d="M80 140 L80 80 L160 80"/>
    <circle cx="80" cy="500" r="3" fill="#4fc3f7"/>
    <circle cx="200" cy="560" r="3" fill="#4fc3f7"/>
  </g>

  <!-- Version tag -->
  <rect x="80" y="80" width="148" height="28" rx="14" fill="#7c6af7" fill-opacity="0.12" stroke="#7c6af7" stroke-opacity="0.3" stroke-width="1"/>
  <text x="154" y="99" font-family="monospace" font-size="12" fill="#7c6af7" text-anchor="middle" letter-spacing="2">KAIZEN v07.0</text>

  <!-- Main headline -->
  <text x="80" y="200" font-family="monospace" font-size="14" fill="#5a6480" letter-spacing="4">// CISO CAREER TRACKER</text>

  <text x="80" y="270" font-family="Georgia, serif" font-size="64" font-weight="700" fill="#e2e8f0" letter-spacing="-1">
    Your CISO Journey,
  </text>
  <text x="80" y="350" font-family="Georgia, serif" font-size="64" font-weight="700" letter-spacing="-1">
    <tspan fill="#7c6af7">Tracked.</tspan>
    <tspan fill="#4fc3f7"> Measured.</tspan>
  </text>
  <text x="80" y="430" font-family="Georgia, serif" font-size="64" font-weight="700" fill="#69f0ae" letter-spacing="-1">Achieved.</text>

  <!-- Tagline -->
  <text x="80" y="500" font-family="monospace" font-size="16" fill="#5a6480" letter-spacing="1">Daily habits · Career roadmap · Interview prep · AI coach · Milestone badges</text>

  <!-- URL tag -->
  <rect x="80" y="540" width="420" height="36" rx="8" fill="#12151c" stroke="#272d3d" stroke-width="1"/>
  <text x="100" y="563" font-family="monospace" font-size="13" fill="#5a6480">🛡️  </text>
  <text x="126" y="563" font-family="monospace" font-size="13" fill="#7c6af7">corvus-one.github.io/ciso-career-tracker</text>

  <!-- Right side — mini dashboard mockup -->
  <g transform="translate(820, 80)">
    <!-- Card 1 - streak -->
    <rect x="0" y="0" width="180" height="90" rx="10" fill="#12151c" stroke="#272d3d" stroke-width="1"/>
    <text x="16" y="24" font-family="monospace" font-size="9" fill="#5a6480" letter-spacing="2">🔥 STREAK</text>
    <text x="16" y="65" font-family="monospace" font-size="42" font-weight="700" fill="#ff8a65">14</text>
    <text x="70" y="65" font-family="monospace" font-size="12" fill="#5a6480">days</text>

    <!-- Card 2 - habits -->
    <rect x="200" y="0" width="180" height="90" rx="10" fill="#12151c" stroke="#272d3d" stroke-width="1"/>
    <text x="216" y="24" font-family="monospace" font-size="9" fill="#5a6480" letter-spacing="2">✓ TODAY</text>
    <text x="216" y="65" font-family="monospace" font-size="42" font-weight="700" fill="#69f0ae">5</text>
    <text x="262" y="65" font-family="monospace" font-size="12" fill="#5a6480">/ 6 habits</text>

    <!-- Card 3 - readiness -->
    <rect x="0" y="110" width="180" height="90" rx="10" fill="#12151c" stroke="#272d3d" stroke-width="1"/>
    <text x="16" y="134" font-family="monospace" font-size="9" fill="#5a6480" letter-spacing="2">🎯 INTERVIEW</text>
    <text x="16" y="175" font-family="monospace" font-size="42" font-weight="700" fill="#f06292">78<tspan font-size="18">%</tspan></text>
    <text x="80" y="175" font-family="monospace" font-size="11" fill="#5a6480">ready</text>

    <!-- Card 4 - cert countdown -->
    <rect x="200" y="110" width="180" height="90" rx="10" fill="#12151c" stroke="#272d3d" stroke-width="1"/>
    <text x="216" y="134" font-family="monospace" font-size="9" fill="#5a6480" letter-spacing="2">⏱ CISM EXAM</text>
    <text x="216" y="175" font-family="monospace" font-size="42" font-weight="700" fill="#4fc3f7">47</text>
    <text x="272" y="175" font-family="monospace" font-size="11" fill="#5a6480">days</text>

    <!-- Progress bars -->
    <rect x="0" y="220" width="380" height="60" rx="10" fill="#12151c" stroke="#272d3d" stroke-width="1"/>
    <text x="16" y="242" font-family="monospace" font-size="9" fill="#5a6480" letter-spacing="2">CAREER ROADMAP</text>
    <!-- Phase dots -->
    <circle cx="30" cy="265" r="6" fill="#69f0ae"/>
    <line x1="36" y1="265" x2="96" y2="265" stroke="#272d3d" stroke-width="2"/>
    <circle cx="102" cy="265" r="6" fill="#69f0ae"/>
    <line x1="108" y1="265" x2="168" y2="265" stroke="#272d3d" stroke-width="2"/>
    <circle cx="174" cy="265" r="6" fill="#7c6af7"/>
    <line x1="180" y1="265" x2="240" y2="265" stroke="#272d3d" stroke-width="2"/>
    <circle cx="246" cy="265" r="6" fill="#272d3d" stroke="#5a6480" stroke-width="1.5"/>
    <line x1="252" y1="265" x2="312" y2="265" stroke="#272d3d" stroke-width="2"/>
    <circle cx="318" cy="265" r="6" fill="#272d3d" stroke="#5a6480" stroke-width="1.5"/>
    <text x="168" y="285" font-family="monospace" font-size="8" fill="#7c6af7" text-anchor="middle">YOU ARE HERE</text>

    <!-- Badge row -->
    <rect x="0" y="300" width="380" height="60" rx="10" fill="#12151c" stroke="#272d3d" stroke-width="1"/>
    <text x="16" y="322" font-family="monospace" font-size="9" fill="#5a6480" letter-spacing="2">BADGES EARNED</text>
    <text x="20" y="348" font-size="20">🌱</text>
    <text x="52" y="348" font-size="20">🔥</text>
    <text x="84" y="348" font-size="20">⚡</text>
    <text x="116" y="348" font-size="20">🎯</text>
    <text x="148" y="348" font-size="20">📓</text>
    <text x="180" y="348" font-size="20">🤖</text>
    <text x="212" y="348" font-size="20" opacity="0.25">💎</text>
    <text x="244" y="348" font-size="20" opacity="0.25">🏆</text>
    <text x="276" y="348" font-size="20" opacity="0.25">🦁</text>
  </g>

  <!-- Bottom border -->
  <rect x="0" y="639" width="1280" height="1" fill="#272d3d"/>

  <!-- Copyright -->
  <text x="1200" y="620" font-family="monospace" font-size="10" fill="#272d3d" text-anchor="end">© 2026 Corvus-One · CC BY-NC 4.0</text>
</svg>
